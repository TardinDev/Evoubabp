<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" fill="none">
  <!-- Butterfly icon - minimalist line art -->
  <g transform="translate(50, 50)" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left upper wing -->
    <path d="M 80,80 C 50,30 10,35 10,65 C 10,95 40,105 80,80"/>
    <!-- Left lower wing -->
    <path d="M 80,80 C 55,120 25,135 20,155 C 45,170 75,140 80,80"/>
    <!-- Right upper wing -->
    <path d="M 80,80 C 110,30 150,35 150,65 C 150,95 120,105 80,80"/>
    <!-- Right lower wing -->
    <path d="M 80,80 C 105,120 135,135 140,155 C 115,170 85,140 80,80"/>
    <!-- Body -->
    <line x1="80" y1="40" x2="80" y2="160"/>
    <!-- Antennae -->
    <path d="M 80,40 Q 68,25 62,18"/>
    <path d="M 80,40 Q 92,25 98,18"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(230, 135)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="400" fill="#0F172A" letter-spacing="1" font-style="italic">evoubap</text>
    <line x1="4" y1="18" x2="310" y2="18" stroke="#94A3B8" stroke-width="1"/>
    <text x="4" y="38" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#64748B" letter-spacing="8">E V O U B A P . C O M</text>
  </g>
</svg>
