<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" fill="none">
  <defs>
    <linearGradient id="wingGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="wingGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Butterfly icon -->
  <g transform="translate(30, 30)">
    <!-- Left upper wing -->
    <path d="M 100,100 Q 40,30 20,60 Q 5,95 30,120 Q 60,135 100,100 Z"
          fill="url(#wingGrad1)" opacity="0.95"/>
    <!-- Left lower wing -->
    <path d="M 100,100 Q 55,155 40,175 Q 65,195 95,165 Q 100,140 100,100 Z"
          fill="url(#wingGrad1)" opacity="0.75"/>
    <!-- Right upper wing -->
    <path d="M 100,100 Q 160,30 180,60 Q 195,95 170,120 Q 140,135 100,100 Z"
          fill="url(#wingGrad2)" opacity="0.95"/>
    <!-- Right lower wing -->
    <path d="M 100,100 Q 145,155 160,175 Q 135,195 105,165 Q 100,140 100,100 Z"
          fill="url(#wingGrad2)" opacity="0.75"/>
    <!-- Body -->
    <ellipse cx="100" cy="115" rx="4" ry="45" fill="#1E1B4B"/>
    <!-- Antennae -->
    <path d="M 100,70 Q 90,55 85,45" stroke="#1E1B4B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 100,70 Q 110,55 115,45" stroke="#1E1B4B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <circle cx="85" cy="45" r="2.5" fill="#1E1B4B"/>
    <circle cx="115" cy="45" r="2.5" fill="#1E1B4B"/>
    <!-- Accent dots on wings -->
    <circle cx="45" cy="80" r="4" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="155" cy="80" r="4" fill="#FFFFFF" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(250, 130)">
    <text x="0" y="0" font-family="'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="700" fill="#1E1B4B" letter-spacing="-2">evoubap</text>
    <text x="4" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="#7C3AED" letter-spacing="6">TRANSFORMATION DIGITALE</text>
  </g>
</svg>
