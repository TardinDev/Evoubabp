<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Butterfly - white -->
  <g transform="translate(256, 256)" fill="#FFFFFF">
    <!-- Left upper wing -->
    <path d="M 0,0 Q -130,-150 -170,-80 Q -200,-10 -140,40 Q -70,60 0,0 Z" opacity="0.95"/>
    <!-- Left lower wing -->
    <path d="M 0,0 Q -90,100 -120,160 Q -70,190 -20,130 Q 0,70 0,0 Z" opacity="0.75"/>
    <!-- Right upper wing -->
    <path d="M 0,0 Q 130,-150 170,-80 Q 200,-10 140,40 Q 70,60 0,0 Z" opacity="0.95"/>
    <!-- Right lower wing -->
    <path d="M 0,0 Q 90,100 120,160 Q 70,190 20,130 Q 0,70 0,0 Z" opacity="0.75"/>
    <!-- Body -->
    <ellipse cx="0" cy="30" rx="8" ry="95" fill="#1E1B4B"/>
    <!-- Antennae -->
    <path d="M 0,-65 Q -20,-90 -30,-110" stroke="#1E1B4B" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M 0,-65 Q 20,-90 30,-110" stroke="#1E1B4B" stroke-width="5" stroke-linecap="round" fill="none"/>
    <circle cx="-30" cy="-110" r="6" fill="#1E1B4B"/>
    <circle cx="30" cy="-110" r="6" fill="#1E1B4B"/>
    <!-- Accent dots -->
    <circle cx="-110" cy="-30" r="10" fill="#EC4899"/>
    <circle cx="110" cy="-30" r="10" fill="#EC4899"/>
  </g>
</svg>
